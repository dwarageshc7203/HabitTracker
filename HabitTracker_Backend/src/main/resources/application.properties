spring.application.name=HabitTracker_Backend

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name = org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql = false
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:MySecretKeyForHabitTrackerApplicationJwtTokenGenerationAndValidation2026}
jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration
app.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:3000,https://*.vercel.app,https://habit-tracker-liwupzwqq-dwarageshc7203-6140s-projects.vercel.app

# Gemini Configuration
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash
gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models
gemini.timeout-seconds=15
gemini.rate-limit.window-seconds=60
gemini.rate-limit.max-requests=8

